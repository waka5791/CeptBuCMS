<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Room Viewer</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>

<script src="js/app.js"></script>
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<style>

body{
    padding:10px;
}

#paneA,
#paneB,
#paneC{
    border:1px solid #ccc;
    border-radius:5px;
    padding:10px;
    margin-bottom:10px;
}

#paneA{
    min-height:80px;
}

#paneB{
    min-height:120px;
}

#paneC{
    min-height:400px;
}

.tour-link,
.room-link{
    margin-right:5px;
    margin-bottom:5px;
}

#paneA{

    min-height:80px;
    max-height:300px;

    overflow-y:auto;

}

#tourList .list-group-item{

    cursor:pointer;

}
</style>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
<h5>CMS残骸</h5>
<div id="paneA">
    <h5>ツアー一覧</h5>
</div>

<div id="paneB">
    <h5>ルーム一覧</h5>
</div>

<div id="paneC">
    <h5>ルーム情報</h5>
</div>

</body>
</html>
